<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas del Día</title>

    <link rel="stylesheet" href="/static/css/sanacion.css">

    <style>
        body { padding: 20px; }
        h2 { text-align: center; color: #007bff; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 1.1em;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) { background: #f2f2f2; }

        /* colores por estatus */
        .Disponible { background: #d4edda !important; } 
        .Reservada  { background: #cfe2ff !important; }
        .Confirmada { background: #bee5eb !important; }
        .Cancelada  { background: #f8d7da !important; }
        .Realizada  { background: #e2e3e5 !important; }
        .Cerrada    { background: #d6d8db !important; }

        .btn-volver {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Citas del día {{ fecha }}</h2>

    {% if citas %}
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Paciente</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody>
                {% for c in citas %}
                    <tr class="{{ c.Estatus }}">
                        <td>{{ c.HoraCita }}</td>

                        <td>
                            {% if c.idPaciente %}
                                {{ c.NombrePaciente }}
                            {% else %}
                                <em>Disponible</em>
                            {% endif %}
                        </td>

                        <td>{{ c.Estatus }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

    {% else %}
        <p style="text-align:center; font-size:1.2em; margin-top:20px;">
            No hay citas en este día.
        </p>
    {% endif %}

    <a href="/admin/ver_citas" class="btn-volver">← Volver al calendario</a>

</body>
</html>
