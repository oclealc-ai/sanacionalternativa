<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Principal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/static/img/fondo01.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            justify-content: flex-start; /* ↑ mover contenedor arriba */
            padding-top: 40px;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(100, 255, 255, 0.02); /* más transparente */
            backdrop-filter: blur(15px); /* más blur */
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            text-align: justify;
        }
        
        .layout {
            display: flex;
            width: 90%;
            max-width: 1100px;
            gap: 25px;
        }
    
        .top-block {
            width: 90%;
            max-width: 900px;
            background: rgba(100, 255, 255, 0.02); /* más transparente */
            backdrop-filter: blur(15px); /* más blur */
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            text-align: justify;
        }

        /* bloque lateral */
        .side-block {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: #333;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
        }

        

        /* responsive */
        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }

            .side-block {
                width: 100%;
            }
        }

        .portada-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            font-size: 28px;
            color: #333;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .btns {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: #0078ff;
            color: white;
            padding: 12px 25px;
            border: none;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #005fcc;
        }

        .agradecimiento {
            display: block;
            width: fit-content;
            margin: 10px auto 0 auto; /* centra horizontalmente */
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

    </style>
</head>
<body>

    
    <div class="layout">

        <div class="top-block" id="bloqueInfo">
            {{ frase }}
        </div>


        <div class="container">

            <img src="\static\img\fondo03.jpg" class="portada-img" alt="Imagen temática">

            <h1 id="titulo">Bienvenido al Sistema de Atención</h1>
            <p id="subtitulo">Seleccione cómo desea ingresar al sistema</p>

            <div class="btns">
                <button class="btn" onclick="location.href='/login/paciente'">Soy Paciente</button>
                <button class="btn" onclick="location.href='/login/sistema'">Soy Personal</button>
            </div>

        </div>

    </div>


    <script>
        // Variables temporales (usarán BD después)
        let titulo = "Bienvenido al Centro de Sanación";
        let subtitulo = "Que tipo de usuario eres?";

        document.getElementById("titulo").innerText = titulo;
        document.getElementById("subtitulo").innerText = subtitulo;
    </script>

</body>
</html>
