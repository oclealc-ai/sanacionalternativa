<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanación Alternativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a90e2; --text: #2c3e50; }
        body {
            margin: 0; font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .main-card {
            width: 90%; max-width: 800px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); border-radius: 30px; padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center;
        }
        .frase-dia { color: #607d8b; font-style: italic; margin-bottom: 20px; font-size: 1.1rem; }
        
        /* Carrusel */
        .carousel-container { margin: 30px 0; overflow: hidden; border-radius: 20px; background: #eee; }
        .track { display: flex; transition: transform 0.1s linear; }
        .card { flex: 0 0 280px; margin: 10px; background: white; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-txt { padding: 10px; font-size: 0.9rem; color: var(--primary); font-weight: bold; }

        .btn-box { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn { 
            padding: 15px 30px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; transition: 0.3s; min-width: 160px;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-white { border: 2px solid var(--primary); color: var(--primary); }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="frase-dia">"{{ frase }}"</div>

    <div class="carousel-container">
        <div class="track" id="track">
            {% for a in anuncios %}
            <div class="card" onclick="window.location.href='{{ a.url }}'">
                <img src="{{ a.imagen }}">
                <div class="card-txt">{{ a.descripcion }}</div>
            </div>
            {% endfor %}
            {# Repetimos para el efecto infinito #}
            {% for a in anuncios %}
            <div class="card" onclick="window.location.href='{{ a.url }}'">
                <img src="{{ a.imagen }}">
                <div class="card-txt">{{ a.descripcion }}</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <h1>Sanación Alternativa</h1>
    <div class="btn-box">
        <a href="/e/fc362761" class="btn btn-blue">Acceso Clientes</a>
        <a href="/login/sistema" class="btn btn-white">staff</a>
    </div>
</div>

<script>
    const track = document.getElementById('track');
    let pos = 0;
    function anim() {
        if (track.children.length > 2) {
            pos += 0.6;
            if (pos >= (track.scrollWidth / 2)) pos = 0;
            track.style.transform = `translateX(-${pos}px)`;
        }
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
