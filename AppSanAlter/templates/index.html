<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Principal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/static/img/fondo01.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            min-height: 100vh;
        }

        .menu-principal {
            display: flex;
            flex-direction: column;
            align-items: center; /* centra horizontalmente todos los elementos */
            gap: 15px;           /* espacio entre imagen, título, subtítulo y botones */
            max-width: 900px;
            width: 90%;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(100, 255, 255, 0.02); /* más transparente */
            backdrop-filter: blur(15px); /* más blur */
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            text-align: justify;
        }

        .portada-img {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
        }

        .layout {
            display: flex;
            width: 90%;
            max-width: 1100px;
            gap: 25px;
        }
    
        .top-block {
            width: 90%;
            max-width: 900px;
            background: rgba(100, 255, 255, 0.02); /* más transparente */
            backdrop-filter: blur(15px); /* más blur */
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            text-align: justify;
        }

        /* bloque lateral */
        .side-block {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: #333;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
        }

        

        /* responsive */
        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }

            .side-block {
                width: 100%;
            }
        }

        h1, p {
            text-align: center;
            margin: 0; /* elimina márgenes grandes por defecto */
        }

        .btns {
            display: flex;
            gap: 20px;          /* espacio entre los botones */
            justify-content: center;
            flex-wrap: wrap;     /* en móvil se apilan si no hay espacio */
        }

        .btn {
            background: #0078ff;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            width: 150px; /* ajuste al tamaño deseado */
            max-width: 45%; /* opcional, para que no ocupen todo en móviles */
            padding: 10px 15px; /* opcional: menos padding */
        }

        .btn:hover {
            background: #005fcc;
        }

        .agradecimiento {
            display: block;
            width: fit-content;
            margin: 10px auto 0 auto; /* centra horizontalmente */
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        .titulo-botones {
            display: flex;
            flex-direction: column;  /* apila título y subtítulo */
            align-items: center;     /* centra todo horizontalmente */
            gap: 15px;               /* espacio entre título, subtítulo y botones */
        }

        .btns {
            display: flex;
            justify-content: center; /* centra los botones horizontalmente */
            gap: 20px;               /* espacio entre los botones */
            flex-wrap: wrap;         /* permite que se acomoden en móvil si hace falta */
        }


    </style>
</head>
<body>

    
    <div class="layout">

        <div class="top-block" id="bloqueInfo">
            {{ frase }}
        </div>


        <div class="menu-principal">
            <img src="/static/img/fondo03.jpg" class="portada-img" alt="Imagen temática">

            <h1 id="titulo"></h1>
            <p id="subtitulo"></p>

            <div class="btns">
                <button class="btn" onclick="location.href='/login/paciente'">Soy Paciente</button>
                <button class="btn" onclick="location.href='/login/sistema'">Soy Personal</button>
            </div>
        </div>

    </div>


    <script>
        // Variables temporales (usarán BD después)
        let titulo = "Bienvenido al Centro de Sanación";
        let subtitulo = "Que tipo de usuario eres?";

        document.getElementById("titulo").innerText = titulo;
        document.getElementById("subtitulo").innerText = subtitulo;
    </script>

</body>
</html>
